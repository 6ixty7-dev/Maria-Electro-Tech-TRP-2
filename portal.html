<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Maria Electro Tech — Portal</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #0D2030 0%, #0F4A6E 60%, #1E7FAD 100%);
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }

    .login-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(61,184,232,0.25);
      backdrop-filter: blur(24px);
      border-radius: 28px;
      padding: 52px 44px;
      width: 100%; max-width: 400px;
      text-align: center;
      display: flex; flex-direction: column; align-items: center; gap: 18px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.4);
    }

    .login-logo { height: 90px; width: auto; margin-bottom: 4px; }

    .login-title {
      font-family: 'Nunito', sans-serif;
      font-size: 24px; font-weight: 900; color: white;
    }

    .login-sub { color: rgba(255,255,255,0.45); font-size: 14px; }

    .login-input {
      width: 100%; padding: 15px 20px;
      border-radius: 50px;
      border: 2px solid rgba(61,184,232,0.3);
      background: rgba(255,255,255,0.06);
      color: white; font-size: 18px;
      text-align: center; letter-spacing: 5px;
      font-family: 'Nunito', sans-serif;
      transition: border-color 0.2s;
    }

    .login-input::placeholder { letter-spacing: 2px; font-size: 14px; color: rgba(255,255,255,0.3); }
    .login-input:focus { outline: none; border-color: #3DB8E8; box-shadow: 0 0 0 4px rgba(61,184,232,0.15); }

    .login-btn {
      width: 100%; padding: 15px;
      background: #3DB8E8; color: white;
      border: none; border-radius: 50px;
      font-family: 'Nunito', sans-serif; font-size: 16px; font-weight: 800;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 16px rgba(61,184,232,0.4);
    }

    .login-btn:hover { background: #1E9FD4; transform: translateY(-2px); }

    .login-error {
      color: #FCA5A5; font-size: 13px; font-weight: 600;
      display: none; margin-top: -8px;
    }

    .login-hint {
      color: rgba(255,255,255,0.25); font-size: 12px; margin-top: 8px;
    }
  </style>
</head>
<body>
<div class="login-card">
  <img src="logo.png" alt="Maria Electro Tech" class="login-logo"/>
  <div class="login-title">Admin Portal</div>
  <div class="login-sub">Enter your password to access the dashboard</div>
  <input type="password" class="login-input" id="pwd" placeholder="Enter password" onkeyup="tryLogin(event)"/>
  <div class="login-error" id="err">❌ Wrong password. Please try again.</div>
  <button class="login-btn" onclick="tryLogin({key:'Enter'})">Enter Portal →</button>
  <div class="login-hint">You will stay logged in while the browser tab is open</div>
</div>

<script>
  // ⚠️ CHANGE THIS PASSWORD
  const ADMIN_PASSWORD = "maria2025";

  // If already logged in, go straight to dashboard
  if (sessionStorage.getItem('mariaAuth') === 'true') {
    window.location.href = 'dashboard.html';
  }

  function tryLogin(e) {
    if (e.key !== 'Enter' && e.type !== 'click') return;
    const val = document.getElementById('pwd').value;
    if (val === ADMIN_PASSWORD) {
      sessionStorage.setItem('mariaAuth', 'true');
      window.location.href = 'dashboard.html';
    } else {
      document.getElementById('err').style.display = 'block';
      document.getElementById('pwd').value = '';
      document.getElementById('pwd').focus();
    }
  }
</script>
</body>
</html>
