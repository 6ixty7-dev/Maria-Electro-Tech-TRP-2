<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Job Records — Maria Electro Tech</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<script src="nav.js"></script>

<div class="page-wrap">
  <div class="page-top">
    <div><h1>📋 Job Records</h1><p>All recorded jobs. Newest first.</p></div>
    <a href="admin.html" class="btn btn-primary">➕ Add Job</a>
  </div>

  <div class="table-card">
    <div class="table-toolbar">
      <h3>All Jobs <span id="job-count" style="color:var(--blue);font-size:14px;"></span></h3>
      <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
        <input type="text" class="search-input" id="search" placeholder="🔍 Search..." oninput="filter()"/>
        <select class="search-input" id="filter-status" style="min-width:130px;" onchange="filter()">
          <option value="">All Status</option>
          <option value="Paid">✅ Paid</option>
          <option value="Pending">⏳ Pending</option>
        </select>
        <select class="search-input" id="filter-staff" style="min-width:130px;" onchange="filter()">
          <option value="">All Staff</option>
          <option>Francis</option>
          <option>Anoop</option>
          <option>Rakesh</option>
        </select>
      </div>
    </div>
    <div id="jobs-container">
      <div class="empty-state"><span class="es-icon">⏳</span><p>Loading jobs...</p></div>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="script.js"></script>
<script>
  renderNav('jobs');
  let allJobs = [];

  async function init() {
    allJobs = await fetchJobsFromSheet() || [];
    filter();
  }

  function filter() {
    const q      = document.getElementById('search').value.toLowerCase();
    const status = document.getElementById('filter-status').value;
    const staff  = document.getElementById('filter-staff').value;

    let rows = allJobs.filter(j =>
      (!status || String(j[15]) === status) &&
      (!staff  || String(j[6]).includes(staff)) &&
      (!q      || j.some(c => String(c).toLowerCase().includes(q)))
    );

    document.getElementById('job-count').textContent = `(${rows.length})`;
    render(rows);
  }

  function render(rows) {
    const c = document.getElementById('jobs-container');
    if (!rows.length) {
      c.innerHTML=`<div class="empty-state"><span class="es-icon">🔍</span><p>No jobs found.</p></div>`;
      return;
    }
    const sorted = [...rows].reverse();
    c.innerHTML = `<div class="table-wrap"><table>
      <thead><tr>
        <th>#</th><th>Date</th><th>Customer</th><th>Phone</th>
        <th>Category</th><th>Staff</th>
        <th>Mat. Charged</th><th>Mat. Actual</th>
        <th>Labour Chg.</th><th>Staff Cut</th>
        <th>Total Charged</th><th>Mat. Profit</th>
        <th>Lab. Profit</th><th>Final Profit</th><th>Status</th>
      </tr></thead>
      <tbody>
        ${sorted.map((j,i)=>{
          const p = calcJobProfit(j);
          return `<tr>
            <td style="color:var(--gray);font-size:12px;">${sorted.length-i}</td>
            <td>${j[0]||'—'}</td>
            <td><strong>${j[1]||'—'}</strong><br/><span style="font-size:12px;color:var(--gray)">${j[3]||''}</span></td>
            <td>${j[2]||'—'}</td>
            <td><span class="badge badge-blue">${j[4]||'—'}</span></td>
            <td>${j[6]||'—'}</td>
            <td>${fmt(j[7])}</td>
            <td>${fmt(j[8])}</td>
            <td>${fmt(j[9])}</td>
            <td>${fmt(j[10])}</td>
            <td><strong>${fmt(j[11])}</strong></td>
            <td style="color:${p.matProfit>=0?'var(--green-text)':'var(--red)'};">${fmt(p.matProfit)}</td>
            <td style="color:${p.labourProfit>=0?'var(--green-text)':'var(--red)'};">${fmt(p.labourProfit)}</td>
            <td style="color:${p.finalProfit>=0?'var(--green-text)':'var(--red)'};">
              <strong>${fmt(p.finalProfit)}</strong>
            </td>
            <td><span class="badge ${j[15]==='Paid'?'badge-paid':'badge-pending'}">${j[15]==='Paid'?'✅ Paid':'⏳ Pending'}</span></td>
          </tr>`;
        }).join('')}
      </tbody>
    </table></div>`;
  }

  init();
</script>
</body>
</html>
